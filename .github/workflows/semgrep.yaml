on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  semgrep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep (Security Audit Rules)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten,p/security-audit
          generateSarif: "1"